workflow:
  rules:
    - if: $NIGHTLY_BUILD
    - if: $DEBIAN_BUILD
    - if: $WINDOWS_BUILD
    - if: $DEPLOY_FLATPAK
    - if: $CI_PIPELINE_SOURCE == "push"

stages:
  - test
  - prepare-build
  - build
  - deploy
  - publish

variables:
  WINDOWS_RELEASE: '/^(\d\.)*(\d){1}(\+win)*?$/'
  UNIX_RELEASE: '/^(\d\.)*(\d){1}(\+unix)*?$/'
  MACOS_RELEASE: '/^(\d\.)*(\d){1}(\+macos)*?$/'

test-other:
  image: gajim-test
  stage: test
  script:
    - ./make.py build
    - pyproject-build
    - appstream-util validate dist/metadata/org.gajim.Gajim.metainfo.xml
  interruptible: true

test-codespell:
  image: gajim-test
  stage: test
  script:
    - codespell --version
    - codespell
  interruptible: true

test-pyright:
  image: gajim-test
  stage: test
  rules:
    - changes:
      - "**/*.py"
  script:
    - pip install git+https://dev.gajim.org/gajim/python-nbxmpp.git
    - pip install git+https://dev.gajim.org/gajim/omemo-dr.git
    - pyright --version
    - pyright
  interruptible: true

test-ruff-lint:
  image: gajim-test
  stage: test
  rules:
    - changes:
      - "**/*.py"
  script:
    - ruff --version
    - ruff check --output-format=gitlab --output-file=code-quality-report.json
  artifacts:
    reports:
      codequality: $CI_PROJECT_DIR/code-quality-report.json
  interruptible: true

test-ruff-format:
  image: gajim-test
  stage: test
  rules:
    - changes:
      - "**/*.py"
  script:
    - ruff --version
    - ruff format --diff
  interruptible: true

test-unittest:
  image: gajim-test
  stage: test
  script:
    - pip install git+https://dev.gajim.org/gajim/python-nbxmpp.git
    - pip install git+https://dev.gajim.org/gajim/omemo-dr.git
    - coverage run --source=gajim -m unittest discover -s test -v
    - coverage report -mi
    - coverage xml -i
  coverage: "/TOTAL.+ ([0-9]{1,3}%)/"
  artifacts:
    reports:
      coverage_report: 
        coverage_format: cobertura
        path: coverage.xml
  interruptible: true

prepare-build:
  stage: prepare-build
  rules:
    - if: '$DEBIAN_BUILD'
    - if: '$WINDOWS_BUILD'
    - if: '$NIGHTLY_BUILD'
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "CURRENT_DATE_1=$(date +'%Y%m%d')" >> vars.env
    - echo "CURRENT_DATE_2=$(date +'%Y-%m-%d')" >> vars.env
    - echo "GAJIM_VERSION=$(echo $CI_COMMIT_TAG | cut -d+ -f 1)" >> vars.env
    - echo "GAJIM_SHORT_VERSION=$(echo $CI_COMMIT_TAG | cut -c 1-3)" >> vars.env
    - cat vars.env

  artifacts:
    reports:
      dotenv: vars.env

build-unix:
  image: gajim-build
  stage: build
  rules:
    - if: '$DEBIAN_BUILD'
    - if: '$NIGHTLY_BUILD'
    - if: '$CI_COMMIT_TAG =~ $UNIX_RELEASE'
  script:
    - ./make.py build
    - pyproject-build

  artifacts:
    name: "gajim-$CI_COMMIT_REF_NAME-$CI_COMMIT_SHA"
    expire_in: 1 week
    paths:
      - dist/gajim-*.tar.gz
      - dist/gajim-*.whl

build-debian-nightly:
  image: gajim-build
  stage: build
  variables:
    REV: "1"
  needs: ["build-unix"]
  rules:
    - if: '$DEBIAN_BUILD'
    - if: '$NIGHTLY_BUILD'
  allow_failure: true
  script:
    - apt-get update
    - apt-get install -y python3-nbxmpp-nightly
    - apt-get install -y python3-omemo-dr
    - release-helper build-debian-pkg "$(find dist/gajim-*.tar.gz)" $REV --pkgsuffix=nightly

  artifacts:
    name: "gajim-$CI_COMMIT_REF_NAME-$CI_COMMIT_SHA"
    expire_in: 1 week
    paths:
      - debian_build/*

build-windows:
  image: gajim-build
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG =~ $WINDOWS_RELEASE'
  script:
    - >
      release-helper build-windows-pkg \
        --account=lovetox \
        --repository=https://dev.gajim.org/gajim/gajim \
        --branch=master \
        --version=$GAJIM_VERSION \
        --commit-sha=$CI_COMMIT_SHA \
        --api-key=$APPVEYOR_API_KEY \
        .ci/appveyor.yml
  artifacts:
    expire_in: 1 day
    paths:
      - windows_build/*.json

build-windows-nightly:
  image: gajim-build
  stage: build
  rules:
    - if: '$NIGHTLY_BUILD'
    - if: '$WINDOWS_BUILD'
  script:
    - >
      release-helper build-windows-pkg \
        --account=lovetox \
        --repository=https://dev.gajim.org/gajim/gajim \
        --branch=$CI_COMMIT_BRANCH \
        --version=Nightly \
        --commit-sha=$CI_COMMIT_SHA \
        --api-key=$APPVEYOR_API_KEY \
        .ci/appveyor.yml
  artifacts:
    expire_in: 1 day
    paths:
      - windows_build/*.json

deploy-unix:
  image: gajim-deploy
  stage: deploy
  needs: ["build-unix"]
  rules:
    - if: '$CI_COMMIT_TAG =~ $UNIX_RELEASE'
  script:
    - >
      release-helper deploy-to-ftp \
        --host=$FTP_HOST \
        --user=$FTP_USER \
        --password=$FTP_PASS \
        --directory=downloads/$GAJIM_SHORT_VERSION \
        --rename=gajim-$GAJIM_VERSION.tar.gz \
        "$(find dist/gajim-*.tar.gz)"

deploy-unix-nightly:
  image: gajim-deploy
  stage: deploy
  needs: ["build-unix"]
  rules:
    - if: '$NIGHTLY_BUILD'
  allow_failure:
    exit_codes:
      - 100
  script:
    - release-helper nightly-check
    - >
      release-helper deploy-to-ftp \
        --host=$FTP_HOST \
        --user=$FTP_USER \
        --password=$FTP_PASS \
        --directory=downloads/snap \
        --rename=gajim-$CURRENT_DATE_2.tar.gz \
        "$(find dist/gajim-*.tar.gz)"

deploy-debian-nightly:
  image: gajim-deploy
  stage: deploy
  needs: ["build-debian-nightly"]
  rules:
    - if: '$DEBIAN_BUILD'
    - if: '$NIGHTLY_BUILD'
  allow_failure: true
  script:
    - |
      if [ "$FORCE_DEB_DEPLOY" != "true" ]
      then
        release-helper nightly-check
      fi
    - >
      release-helper deploy-to-ftp \
        --host=$FTP_HOST \
        --user=$FTP_USER \
        --password=$FTP_PASS \
        --directory=debian/gajim/$CURRENT_DATE_1 \
        debian_build

deploy-windows:
  image: gajim-deploy
  stage: deploy
  needs: ["build-windows"]
  rules:
    - if: '$CI_COMMIT_TAG =~ $WINDOWS_RELEASE'
  script:
    - release-helper download-appveyor-artifacts "$(find windows_build/*.json)" windows_build
    - rm windows_build/*.json
    - >
      release-helper deploy-to-ftp \
        --host=$FTP_HOST \
        --user=$FTP_USER \
        --password=$FTP_PASS \
        --directory=downloads/$GAJIM_SHORT_VERSION \
        windows_build

deploy-windows-nightly:
  image: gajim-deploy
  stage: deploy
  needs: ["build-windows-nightly"]
  rules:
    - if: '$NIGHTLY_BUILD'
    - if: '$WINDOWS_BUILD'
  allow_failure:
    exit_codes:
      - 100
  script:
    - release-helper nightly-check
    - release-helper download-appveyor-artifacts "$(find windows_build/*.json)" windows_build
    - rm windows_build/*.json
    - >
      release-helper deploy-to-ftp \
        --host=$FTP_HOST \
        --user=$FTP_USER \
        --password=$FTP_PASS \
        --directory=downloads/snap/win \
        windows_build

deploy-flatpak:
  image: gajim-deploy
  stage: deploy
  dependencies: []
  rules:
    - if: '$DEPLOY_FLATPAK'
    - if: '$CI_COMMIT_TAG =~ $UNIX_RELEASE'
  before_script:
    - eval $(ssh-agent -s)
    - .ci/prepare_git.sh github.com "${FLATHUB_DEPLOY_KEY}"
  script:
    - git clone git@github.com:flathub/org.gajim.Gajim.git
    - cd org.gajim.Gajim
    - mv ../flatpak/org.gajim.Gajim.yaml org.gajim.Gajim.yaml
    - mv ../flatpak/app-overrides.json app-overrides.json
    - git diff
    - git add --all
    - git commit -m "$CI_COMMIT_TAG$DEPLOY_FLATPAK"
    - git push

publish-website:
  image: gajim-publish
  stage: publish
  dependencies: ["prepare-build"]
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - eval $(ssh-agent -s)
    - .ci/prepare_git.sh dev.gajim.org "${WEBSITE_DEPLOY_KEY}"
  script:
    - git clone git@dev.gajim.org:gajim/website.git
    - cd website
    - git checkout master
    - python ./scripts/bump_version.py $GAJIM_VERSION
    - git diff
    - git add -u
    - git commit -m "Release Gajim $GAJIM_VERSION"
    - git push

publish-release:
  image: gajim-publish
  stage: publish
  dependencies: ["prepare-build"]
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - >
      release-helper finish-milestone \
        $CI_PROJECT_ID \
        $PROJECT_TOKEN \
        --version=$GAJIM_VERSION \
        --title="Next Release"
    - >
      release-helper create-release \
        $CI_PROJECT_ID \
        $PROJECT_TOKEN \
        --version=$GAJIM_VERSION \
        --tag=$CI_COMMIT_TAG \
        --milestone=$GAJIM_VERSION
